name: Publish to PyPI.org

on:
  pull_request:
    branches: [develop, master]
  release:
    types: [published]
  push:
    tags:
      - v*

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13

      - name: Build Packages
        run: |
          uv build --wheel csvw-eo-library

      - name: Sanity Check
        run: |
          uv run --isolated --no-project --with csvw-eo-library/dist/csvw_eo-* python -c 'import csvw_eo'
         
      - name: Publish Packages
        if: github.event_name == 'release' || github.ref_type == 'tag'
        run: |
          uv publish csvw-eo-library/dist/* --check-url https://pypi.org/simple --token ${{ secrets.PYPI_TOKEN }}
